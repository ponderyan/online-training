<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @page { margin: 15mm 12mm; }
  body {
    margin: 0;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #fff;
    color: #3a3028;
  }
  .certificate {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 40px 28px;
    box-sizing: border-box;
    position: relative;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 2px solid #d4a574;
  }
  .logo {
    font-size: 14px;
    color: #e87a30;
    letter-spacing: 3px;
    margin-bottom: 6px;
  }
  .title {
    font-size: 26px;
    font-weight: bold;
    color: #3a3028;
    letter-spacing: 12px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 24px;
    margin: 20px 0;
    font-size: 13px;
    line-height: 2;
  }
  .info-grid .label {
    color: #8a8078;
  }
  .info-grid .value {
    color: #3a3028;
  }
  .info-grid .name-value {
    font-size: 18px;
    font-weight: bold;
    color: #3a3028;
    letter-spacing: 2px;
  }
  .date-row {
    grid-column: 1 / -1;
    font-size: 12px;
    color: #a09890;
    padding-top: 4px;
    border-top: 1px dashed #e0d8d0;
  }

  .hours-table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 13px;
  }
  .hours-table th {
    background: #f5f0eb;
    color: #5a5048;
    padding: 8px 16px;
    text-align: left;
    border-bottom: 2px solid #d4a574;
    font-weight: 600;
  }
  .hours-table td {
    padding: 8px 16px;
    border-bottom: 1px solid #e8d5c0;
    color: #5a5048;
  }
  .hours-table .hours-cell {
    text-align: right;
    font-weight: 600;
    color: #e87a30;
  }
  .hours-table .total-row td {
    border-bottom: none;
    border-top: 2px solid #d4a574;
    font-weight: bold;
    color: #3a3028;
    padding-top: 10px;
  }
  .hours-table .total-row .hours-cell {
    font-size: 15px;
    color: #e87a30;
  }

  .meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #8a8078;
    margin: 20px 0;
    padding-top: 14px;
    border-top: 1px solid #e0d8d0;
  }

  .footer {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 24px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px dashed #e0d8d0;
  }
  .seal-area img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
  }
  .qr-area img {
    width: 100px;
    height: 100px;
  }

  .verify {
    font-size: 11px;
    color: #a09890;
    text-align: center;
    margin-top: 12px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="certificate">
  <div class="header">
    <div class="logo">🦊 FoxLearn 狐学</div>
    <div class="title">学 时 证 明</div>
  </div>

  <div class="info-grid">
    <div><span class="label">姓　　名：</span><span class="name-value">{{studentName}}</span></div>
    <div><span class="label">身份证号：</span><span class="value">{{idCardMasked}}</span></div>
    <div><span class="label">培训班：</span><span class="value">{{programName}}</span></div>
    <div><span class="label">所属机构：</span><span class="value">{{orgName}}</span></div>
    <div class="date-row">学时期间：{{startDate}} 至 {{endDate}}</div>
  </div>

  <table class="hours-table">
    <thead>
      <tr><th>学时类型</th><th style="text-align:right;">学时（小时）</th></tr>
    </thead>
    <tbody>
      {{hoursDetailTable}}
      <tr class="total-row">
        <td><strong>合 计</strong></td>
        <td class="hours-cell">{{totalHours}}</td>
      </tr>
    </tbody>
  </table>

  <div class="meta">
    <span>证书编号：{{certificateNo}}</span>
    <span>发证日期：{{issueDate}}</span>
  </div>

  <div class="footer">
    <div class="seal-area">
      <img src="{{sealDataUrl}}" alt="FoxLearn 印章" onerror="this.style.display='none'" />
    </div>
    <div class="qr-area">
      <img src="{{qrDataUrl}}" alt="QR Code" />
    </div>
  </div>

  <div class="verify">
    验证：foxlearn.cn/verify-hours<br/>
    防伪指纹：{{sealHash}}
  </div>
</div>
</body>
</html>
