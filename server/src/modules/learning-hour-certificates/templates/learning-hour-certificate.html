<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @page { margin: 0; }
  body {
    margin: 0;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f5f0eb;
  }
  .certificate {
    width: 800px;
    min-height: 560px;
    background: #fff;
    border: 2px solid #d4a574;
    padding: 48px 56px;
    box-sizing: border-box;
    position: relative;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }
  .certificate::before {
    content: '';
    position: absolute;
    top: 12px; left: 12px; right: 12px; bottom: 12px;
    border: 1px solid #e8d5c0;
    pointer-events: none;
  }
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo {
    font-size: 18px;
    color: #e87a30;
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .title {
    font-size: 30px;
    font-weight: bold;
    color: #3a3028;
    letter-spacing: 16px;
  }
  .info-section {
    text-align: left;
    font-size: 14px;
    color: #5a5048;
    line-height: 2.2;
    margin: 28px 0;
    padding: 0 20px;
  }
  .info-section .label {
    color: #8a8078;
    display: inline-block;
    width: 100px;
  }
  .info-section .value {
    color: #3a3028;
    font-weight: 600;
    font-size: 15px;
  }
  .info-section .name-value {
    font-size: 22px;
    font-weight: bold;
    color: #3a3028;
    letter-spacing: 4px;
  }
  .hours-table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-size: 13px;
  }
  .hours-table th {
    background: #f5f0eb;
    color: #5a5048;
    padding: 8px 16px;
    text-align: left;
    border-bottom: 2px solid #d4a574;
    font-weight: 600;
  }
  .hours-table td {
    padding: 8px 16px;
    border-bottom: 1px solid #e8d5c0;
    color: #5a5048;
  }
  .hours-table .hours-cell {
    text-align: right;
    font-weight: 600;
    color: #e87a30;
  }
  .hours-table .total-row td {
    border-bottom: none;
    border-top: 2px solid #d4a574;
    font-weight: bold;
    color: #3a3028;
    padding-top: 12px;
  }
  .hours-table .total-row .hours-cell {
    font-size: 16px;
    color: #e87a30;
  }
  .meta {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #8a8078;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px dashed #d4a574;
  }
  .verify {
    font-size: 12px;
    color: #a09890;
    text-align: center;
    margin-top: 8px;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 24px;
  }
  .seal-area {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .seal-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid #c0392b;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #c0392b;
    text-align: center;
    font-weight: bold;
    line-height: 1.3;
    background: rgba(192, 57, 43, 0.03);
    transform: rotate(-15deg);
  }
  .qr-area {
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-area img {
    width: 100%;
    height: 100%;
  }
  .date-range {
    font-size: 12px;
    color: #a09890;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="certificate">
  <div class="header">
    <div class="logo">🦊 FoxLearn 狐学</div>
    <div class="title">学 时 证 明</div>
  </div>

  <div class="info-section">
    <div>
      <span class="label">姓　　名：</span>
      <span class="name-value">{{studentName}}</span>
    </div>
    <div>
      <span class="label">身份证号：</span>
      <span class="value">{{idCardMasked}}</span>
    </div>
    <div>
      <span class="label">培训班：</span>
      <span class="value">{{programName}}</span>
    </div>
    <div>
      <span class="label">所属机构：</span>
      <span class="value">{{orgName}}</span>
    </div>
  </div>

  <div class="date-range">
    学时期间：{{startDate}} 至 {{endDate}}
  </div>

  <table class="hours-table">
    <thead>
      <tr>
        <th>学时类型</th>
        <th style="text-align:right;">学时（小时）</th>
      </tr>
    </thead>
    <tbody>
      {{hoursDetailTable}}
      <tr class="total-row">
        <td><strong>合 计</strong></td>
        <td class="hours-cell">{{totalHours}}</td>
      </tr>
    </tbody>
  </table>

  <div class="meta">
    <span>证书编号：{{certificateNo}}</span>
    <span>发证日期：{{issueDate}}</span>
  </div>

  <div class="footer">
    <div class="seal-area">
      <div class="seal-circle">🦊<br>FoxLearn<br>学时证明</div>
    </div>
    <div class="qr-area">
      <img src="{{qrDataUrl}}" alt="QR Code" />
    </div>
  </div>

  <div class="verify">
    验证：foxlearn.cn/verify-hours | 编号 {{certificateNo}}
  </div>
</div>
</body>
</html>
